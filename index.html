<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mattia Ambrosini</title>
<style>
  @font-face{
    font-family:"ABC Diatype";
    src:url("fonts/ABCDiatype-Regular.otf") format("opentype");
    font-weight:400;font-style:normal;font-display:swap;
  }
  @font-face{
    font-family:"ABC Diatype";
    src:url("fonts/ABCDiatype-RegularItalic.otf") format("opentype");
    font-weight:400;font-style:italic;font-display:swap;
  }
  @font-face{
    font-family:"ABC Diatype";
    src:url("fonts/ABCDiatype-Medium.otf") format("opentype");
    font-weight:500 700;font-style:normal;font-display:swap;
  }
  @font-face{
    font-family:"ABC Diatype";
    src:url("fonts/ABCDiatype-MediumItalic.otf") format("opentype");
    font-weight:500 700;font-style:italic;font-display:swap;
  }

  :root{
    --bg:#ffffff;
    --ink-1:rgba(0,0,0,0.85);
    --ink-2:rgba(0,0,0,0.60);
    --ink-3:rgba(0,0,0,0.40);
    --hair:rgba(0,0,0,0.10);
    --grey:#C2C2C2;
    --pad:clamp(14px,1.6vw,26px);
    --font:Georgia, "Times New Roman", serif;
    --home-size:16px;
    --pop-size:13px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);color:var(--ink-1);}
  body{font-family:var(--font);font-size:var(--home-size);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  /* no transitions anywhere — interactions are instant */
  a{color:inherit;text-decoration:none;cursor:pointer;}
  em{font-style:italic;}

  /* ---------- HOME ---------- */
  .index{
    display:flex;flex-direction:column;
    min-height:100dvh;
    padding:var(--pad);
    padding-bottom:calc(var(--pad) + env(safe-area-inset-bottom));
    font-size:var(--home-size);
    line-height:1.3;
  }
  .index .line{display:block;color:var(--ink-1);width:max-content;max-width:100%;}
  a.line:hover{opacity:.7;}
  .head-cat{font-style:italic;margin-bottom:8px;}
  .head-cat:not(:first-child){margin-top:16px;}
  .head-cat em{font-style:italic;}
  .top{margin-bottom:auto;}
  .bottom{margin-top:auto;}
  #projects{margin-bottom:1.3em;}
  .foot .muted{color:var(--grey);}

  /* ---------- OVERLAY ---------- */
  #overlay{
    position:fixed;inset:0;
    display:none;
    background:transparent;
    z-index:50;
  }
  #overlay.open{display:block;}

  .pop{
    position:fixed;top:var(--pad);
    background:var(--bg);
    font-size:var(--pop-size);
    line-height:1.32;
  }

  /* left popup = image + caption, top-left, content-height */
  .pop-img{
    left:var(--pad);
    width:calc(50vw - var(--pad)*1.5);
  }
  /* slideshow box: 16:9, full column width, edge-to-edge cover */
  .slideshow{position:relative;width:100%;aspect-ratio:16/9;background:rgba(0,0,0,.04);overflow:hidden;}
  .slideshow img.slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:none;}
  .slideshow.sl-nav{cursor:pointer;}

  /* === SLIDESHOW EDIT LAYER — delete this CSS block (and its JS twin) for the final site === */
  .slideshow[data-edit]{cursor:pointer;}
  .slideshow[data-edit][data-over]{outline:2px solid var(--ink-1);outline-offset:-2px;}
  .sl-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:24px;line-height:1;pointer-events:none;}
  .sl-manage{display:flex;flex-wrap:wrap;gap:6px;padding-top:9px;}
  .sl-thumb{position:relative;width:58px;height:33px;background:rgba(0,0,0,.06);cursor:pointer;}
  .sl-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .sl-thumb[data-sel]{outline:2px solid var(--ink-1);outline-offset:1px;}
  .sl-remove{padding-top:9px;display:flex;gap:1.4em;}
  .sl-remove a:hover{opacity:.7;}
  /* === END SLIDESHOW EDIT LAYER === */
  .cap{
    display:flex;justify-content:space-between;align-items:flex-start;
    gap:2em;padding-top:9px;
  }
  .controls{display:flex;gap:1.4em;white-space:nowrap;}
  .controls a:hover{opacity:.7;}

  /* right popup = extended text, right half, full-height divider */
  .pop-txt{
    left:50vw;
    width:calc(50vw - var(--pad)*1.5);
    padding-left:var(--pad);
    border-left:1px solid var(--hair);
    min-height:calc(100dvh - var(--pad)*2);
    max-height:calc(100dvh - var(--pad)*2);
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    display:none;
  }
  #overlay.expanded .pop-txt{display:block;}

  .txt-grid{
    display:grid;grid-template-columns:1fr 1fr;
    gap:0.5rem;align-items:start;
  }
  .body p{margin:0;}
  .body p + p{margin-top:1.05em;}
  /* caption under slideshow: project title (black) + what's shown (grey) */
  .cap-desc{color:var(--ink-2);}
  /* project-page template: sidebar + intro, then sections */
  .sidebar div + div{margin-top:0;}
  .sidebar .sp{height:1em;}
  .sec-title em{font-style:italic;color:var(--ink-3);}
  .pop-txt .sec{margin-top:1.9em;}
  hr{border:0;border-top:1px solid rgba(0,0,0,0.22);margin:16px 0;}
  .pop-txt hr{margin:2.6em 0 0.55em;}
  .row-close{display:flex;justify-content:flex-end;}
  .row-close a:hover{opacity:.7;}
  .pop-txt .row-close + .txt-grid{margin-top:2.6em;}

  /* ---------- ABOUT panel (right half) ---------- */
  .about-panel{
    position:fixed;top:0;left:50vw;
    width:50vw;min-height:100dvh;
    padding:var(--pad);
    background:var(--bg);
    font-size:var(--pop-size);line-height:1.32;
    overflow:auto;-webkit-overflow-scrolling:touch;max-height:100dvh;
  }
  .about-top{display:grid;grid-template-columns:0.9fr 1.1fr;gap:var(--pad);align-items:start;}
  .meta div{white-space:pre-line;}
  .meta a:hover{opacity:.7;}
  .cv-row{display:grid;grid-template-columns:0.9fr 1.1fr;gap:var(--pad);align-items:start;}
  .cv-row .entry + .entry{margin-top:1.1em;}

  /* ---------- mobile ---------- */
  @media (max-width:760px){
    .pop-img{width:calc(100vw - var(--pad)*2);}
    .pop-txt{left:var(--pad);width:calc(100vw - var(--pad)*2);border-left:0;padding-left:0;background:var(--bg);
      padding-bottom:calc(var(--pad) + env(safe-area-inset-bottom) + 96px);}
    #overlay.expanded .pop-img{display:none;}
    .about-panel{left:0;width:100vw;
      padding-bottom:calc(var(--pad) + env(safe-area-inset-bottom) + 96px);}
    .about-top,.cv-row,.txt-grid{grid-template-columns:1fr;}
  }
</style>
</head>

    /* ---------- slideshow store — per-image sidecars + manifest ----------
       The host only lets us persist small, pre-existing '*.state.json' files
       whose name has NO extra dots. So instead of one huge inline store we use:
         - manifest  '.slideshow.state.json'          = { key: imageCount }
         - one image  '.slideshow-<key>-<i>.state.json' = { u:<dataURL> }
       Each file stays well under the size cap. Images are baked as JPEG. */
    var SS_MANIFEST = 'assets/slideshow.json';
    var SS_SLOTS = {p1:40,p2:40,p3:40,p4:40,p5:40,p6:40,p7:40,p8:40,p9:40}; // pre-created capacity/project
    function ssSlots(key){ return SS_SLOTS[key] || 40; }
    function ssImgFile(key,i){ return 'assets/slideshow-'+key+'-'+i+'.json'; }

    var ssStore = {};                 // key -> [dataURL,...] in memory
    var ssManifest = null;            // cached only on success
    var ssKeyP = {};                  // in-flight loads, deduped per key
    // Fetch a sidecar with retries — the editor preview can drop the first
    // request before its auth token is ready; failures must not be cached.
    function ssFetchJSON(name, tries){
      tries = tries==null ? 4 : tries;
      var opts = (window.omelette && window.omelette.writeFile) ? {cache:'no-store'} : {};
      return fetch(name, opts)
        .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); })
        .catch(function(){
          if(tries<=1) return null;
          return new Promise(function(res){ setTimeout(res,300); })
            .then(function(){ return ssFetchJSON(name, tries-1); });
        });
    }
    function ssLoadManifest(){
      if(ssManifest) return Promise.resolve(ssManifest);
      return ssFetchJSON(SS_MANIFEST).then(function(j){
        if(j && typeof j==='object'){ ssManifest = j; return j; }
        return {};   // transient miss: don't cache, retry on next open
      });
    }
    function ssLoadKey(key){
      if(ssStore[key] && ssStore[key].length) return Promise.resolve(ssStore[key]);
      if(ssKeyP[key]) return ssKeyP[key];
      var p = ssLoadManifest().then(function(m){
        var n = m[key]|0, reqs = [];
        if(!n){ ssStore[key] = []; return ssStore[key]; }
        for(var i=0;i<n;i++){ (function(idx){
          reqs.push(ssFetchJSON(ssImgFile(key,idx)).then(function(j){ return j && j.u ? j.u : null; }));
        })(i); }
        return Promise.all(reqs).then(function(urls){
          ssStore[key] = urls.filter(Boolean);
          return ssStore[key];
        });
      });
      p.then(function(a){ if(!a || !a.length) delete ssKeyP[key]; }, function(){ delete ssKeyP[key]; });
      ssKeyP[key] = p;
      return p;
    }

    /* ---- writes (editor only) ---- */
    function ssWrite(name, obj){
      var w = window.omelette && window.omelette.writeFile;
      if(!w) return Promise.resolve();
      return Promise.resolve(w(name, JSON.stringify(obj))).catch(function(){});
    }
    // Persist one project's images to per-image sidecars, then update manifest.
    function ssSave(key){
      var w = window.omelette && window.omelette.writeFile;
      if(!w) return Promise.resolve();
      if(!key){ return Promise.all(Object.keys(ssStore).map(function(k){ return ssSave(k); })); }
      var arr = ssStore[key] || [], cap = ssSlots(key);
      var prev = (ssManifest && ssManifest[key]) || 0;
      var wrote = Math.min(arr.length, cap), chain = Promise.resolve();
      for(var i=0;i<wrote;i++){ (function(idx){
        chain = chain.then(function(){ return ssWrite(ssImgFile(key,idx), {u:arr[idx]}); });
      })(i); }
      for(var j=wrote;j<Math.min(prev,cap);j++){ (function(idx){   // clear freed slots
        chain = chain.then(function(){ return ssWrite(ssImgFile(key,idx), {}); });
      })(j); }
      return chain.then(function(){
        ssManifest = ssManifest || {};
        ssManifest[key] = wrote;
        return ssWrite(SS_MANIFEST, ssManifest);
      });
    }
    function ssEncode(file){
      return createImageBitmap(file).then(function(bm){
        var cap=1400, scale=Math.min(1, cap/Math.max(bm.width,bm.height));
        var w=Math.max(1,Math.round(bm.width*scale)), h=Math.max(1,Math.round(bm.height*scale));
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        var ctx=cv.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);   // flatten alpha (jpeg fallback)
        ctx.drawImage(bm,0,0,w,h);
        if(bm.close) bm.close();
        var webp = cv.toDataURL('image/webp',0.82);
        return webp.indexOf('image/webp')>-1 ? webp : cv.toDataURL('image/jpeg',0.82);
      });
    }

    function ssRender(box){

      box.querySelectorAll('img.slide').forEach(function(n){ n.remove(); });
      var frag=document.createDocumentFragment();

    // Show a specific slide index (wraps) and keep the caption in lock-step.
    function ssShow(box, i){
      var slides=[].slice.call(box.querySelectorAll('img.slide'));
      if(!slides.length) return;
      i = ((i % slides.length) + slides.length) % slides.length;
      slides.forEach(function(s,k){ s.style.display = k===i ? 'block' : 'none'; });

    // (re)start the automatic 3s cycle for the open slideshow
    function ssAuto(box){

    function ssCycle(box){
      box.__idx = 0;
      // Manual navigation: click the image to move (left third = previous,
      // rest = next). Bound once; skipped while the edit layer owns clicks.
      if(!box.__navBound){

    function ssEnsureLoaded(key, tries){
      tries = tries||0;

        var expected = ssExpected(key);
        var ok = (expected===0) || (expected>0 && urls && urls.length>=expected) || (urls && urls.length>0 && expected<0);

  <!-- =======================================================================
       SLIDESHOW EDIT LAYER  (construction scaffold — delete to ship)
       To remove: delete this whole <script> block AND the CSS block marked
       "SLIDESHOW EDIT LAYER" in <head>. The slideshow then renders the
       images already saved in .slideshow.state.json as static assets.
  ======================================================================== -->
  <script>
  (function(){
    "use strict";

    /* =====================================================================
       IMAGE EDITING ON/OFF
       false = visitors can only VIEW/scroll images (adding & removing off).
       true  = editor mode: drag-drop to add, tap thumbnails to remove.
       Flip this back to true whenever you want to change the images again.
       All the editing code below stays intact either way.
    ===================================================================== */
    var EDIT_IMAGES = false;

    if(!EDIT_IMAGES) return;                                    // editing disabled
    if(!(window.omelette && window.omelette.writeFile)) return; // only in editor

    window.__slideshowEditor = function(box){
      var key = box.getAttribute('data-key');
      var ss = window.__ss;
      box.setAttribute('data-edit','');
      function imgs(){ return ss.store[key] || (ss.store[key] = []); }
      var selected = new Set();

      var input = document.createElement('input');
      input.type='file';
      input.accept='image/png,image/jpeg,image/webp,image/avif';
      input.multiple=true; input.style.display='none';
      box.appendChild(input);

      function refreshEmpty(){
        var e = box.querySelector('.sl-empty');
        if(!imgs().length){
          if(!e){ e=document.createElement('div'); e.className='sl-empty'; e.textContent='+'; box.appendChild(e); }
        } else if(e){ e.remove(); }
      }

      function addFiles(list){
        var files = [].slice.call(list).filter(function(f){ return /^image\//.test(f.type); });
        if(!files.length) return;
        var cap = ss.slots(key), room = cap - imgs().length;
        if(room <= 0){ alert('Questo progetto ha raggiunto il massimo di '+cap+' immagini.'); return; }
        if(files.length > room){ alert('Spazio solo per altre '+room+' immagini in questo progetto: aggiungo le prime '+room+'.'); files = files.slice(0, room); }
        Promise.all(files.map(function(f){ return ss.encode(f); })).then(function(urls){
          var a = imgs();
          urls.forEach(function(u){ a.push(u); });
          ss.save(key);
          paint();
        });
      }

      box.addEventListener('click', function(){ input.click(); });
      input.addEventListener('change', function(){ addFiles(input.files); input.value=''; });
      box.addEventListener('dragover', function(e){ e.preventDefault(); box.setAttribute('data-over',''); });
      box.addEventListener('dragleave', function(e){ if(e.target===box) box.removeAttribute('data-over'); });
      box.addEventListener('drop', function(e){
        e.preventDefault(); box.removeAttribute('data-over');
        if(e.dataTransfer && e.dataTransfer.files) addFiles(e.dataTransfer.files);
      });

      function buildManage(){
        var pop = box.closest('.pop-img');
        var old = pop.querySelector('.sl-manage-wrap'); if(old) old.remove();
        refreshEmpty();
        var arr = imgs();
        if(!arr.length) return;
        var wrap = document.createElement('div'); wrap.className='sl-manage-wrap';
        var strip = document.createElement('div'); strip.className='sl-manage';
        arr.forEach(function(u, idx){
          var t = document.createElement('div'); t.className='sl-thumb';
          if(selected.has(idx)) t.setAttribute('data-sel','');
          var im = document.createElement('img'); im.src=u; im.alt='';
          t.appendChild(im);
          t.addEventListener('click', function(ev){
            ev.stopPropagation();
            if(selected.has(idx)) selected.delete(idx); else selected.add(idx);
            buildManage();
          });
          strip.appendChild(t);
        });
        wrap.appendChild(strip);
        var rm = document.createElement('div'); rm.className='sl-remove';
        var link = document.createElement('a');
        link.textContent = selected.size ? '(Remove '+selected.size+')' : '(Tap images to select)';
        if(selected.size){
          link.addEventListener('click', function(ev){
            ev.stopPropagation();
            ss.store[key] = arr.filter(function(_, idx){ return !selected.has(idx); });
            selected.clear(); ss.save(key); paint();
          });
        }
        rm.appendChild(link);
        wrap.appendChild(rm);
        pop.appendChild(wrap);
      }

      function paint(){ ss.render(box); buildManage(); ss.cycle(box); }
      paint();
    };
  })();
  </script>
  <!-- ===================== END SLIDESHOW EDIT LAYER ===================== -->
</body>
</html>
