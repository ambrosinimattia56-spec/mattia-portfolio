  <div id="__bundler_thumbnail"><div style="width:100%;height:100%;box-sizing:border-box;background:#fff;display:flex;align-items:center;justify-content:center;padding:30%"><svg viewBox="0 0 100 100" width="100%" height="100%"><text x="50" y="62" font-family="Georgia,serif" font-size="60" text-anchor="middle" fill="#111">MA</text></svg></div></div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

eight:1.3;\n  }\n  .index .line{display:block;color:var(--ink-1);width:max-content;max-width:100%;}\n  a.line:hover{opacity:.7;}\n  .head-cat{font-style:italic;margin-bottom:8px;}\n  .head-cat:not(:first-child){margin-top:16px;}\n  .head-cat em{font-style:italic;}\n  .top{margin-bottom:auto;}\n  .bottom{margin-top:auto;}\n  #projects{margin-bottom:1.3em;}\n  .foot .muted{color:var(--grey);}\n\n  /* ---------- OVERLAY ---------- */\n  #overlay{\n    position:fixed;inset:0;\n    display:none;\n    background:transparent;\n    z-index:50;\n  }\n  #overlay.open{display:block;}\n\n  .pop{\n    position:fixed;top:var(--pad);\n    background:var(--bg);\n    font-size:var(--pop-size);\n    line-height:1.32;\n  }\n\n  /* left popup = image + caption, top-left, content-height */\n  .pop-img{\n    left:var(--pad);\n    width:calc(50vw - var(--pad)*1.5);\n  }\n  /* slideshow box: 16:9, full column width, edge-to-edge cover */\n  .slideshow{position:relative;width:100%;aspect-ratio:16/9;background:rgba(0,0,0,.04);overflow:hidden;}\n  .slideshow img.slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:none;}\n  .slideshow.sl-nav{cursor:pointer;}\n\n  /* === SLIDESHOW EDIT LAYER — delete this CSS block (and its JS twin) for the final site === */\n  .slideshow[data-edit]{cursor:pointer;}\n  .slideshow[data-edit][data-over]{outline:2px solid var(--ink-1);outline-offset:-2px;}\n  .sl-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:24px;line-height:1;pointer-events:none;}\n  .sl-manage{display:flex;flex-wrap:wrap;gap:6px;padding-top:9px;}\n  .sl-thumb{position:relative;width:58px;height:33px;background:rgba(0,0,0,.06);cursor:pointer;}\n  .sl-thumb img{width:100%;height:100%;object-fit:cover;display:block;}\n  .sl-thumb[data-sel]{outline:2px solid var(--ink-1);outline-offset:1px;}\n  .sl-remove{padding-top:9px;display:flex;gap:1.4em;}\n  .sl-remove a:hover{opacity:.7;}\n  /* === END SLIDESHOW EDIT LAYER === */\n  .cap{\n    display:flex;justify-content:space-between;align-items:flex-start;\n    gap:2em;padding-top:9px;\n  }\n  .controls{display:flex;gap:1.4em;white-space:nowrap;}\n  .controls a:hover{opacity:.7;}\n\n  /* right popup = extended text, right half, full-height divider */\n  .pop-txt{\n    left:50vw;\n    width:calc(50vw - var(--pad)*1.5);\n    padding-left:var(--pad);\n    border-left:1px solid var(--hair);\n    min-height:calc(100dvh - var(--pad)*2);\n    max-height:calc(100dvh - var(--pad)*2);\n    overflow:auto;\n    -webkit-overflow-scrolling:touch;\n    display:none;\n  }\n  #overlay.expanded .pop-txt{display:block;}\n\n  /* ---------- EXPAND (wide 16:9 image window, test: mycelia) ---------- */\n  .controls [data-collapse]{display:none;}\n  /* Expand screen (default on desktop): More + Close */\n  #overlay.expand .controls [data-expand]{display:none;}\n  #overlay.expand .controls [data-more]{display:inline;}\n  #overlay.expand .controls [data-close]{display:inline;}\n  /* More screen: Expand + Close */\n  #overlay.expanded .controls [data-more]{display:none;}\n  #overlay.expanded .controls [data-expand]{display:inline;}\n  /* image window grows to span the full page width (margin to margin);\n     the slideshow keeps its 16:9 ratio, only shrinking on short viewports\n     so the whole window still fits without overflowing. */\n  #overlay.expand{background:var(--bg);}\n\n  #overlay.expand .pop-img{\n    --exp-w:min(calc(100vw - var(--pad)*2), 1180px, calc((100dvh - var(--pad)*2 - 3.4em) * 16 / 9));\n    width:var(--exp-w);\n    left:calc((100vw - var(--exp-w)) / 2);\n    top:50%;\n    transform:translateY(-50%);\n    padding-bottom:0;\n    z-index:3;\n  }\n  /* Expand focuses on the image: hide the text panel underneath (it comes\n     back if it was open once you Collapse). */\n  #overlay.expand .pop-txt{display:none;}\n  /* match the caption gap to the page margin (left/right/top) */\n  #overlay.expand .cap{padding-top:var(--pad);}\n\n  .txt-grid{\n    display:grid;grid-template-columns:1fr 1fr;\n    gap:0.5rem;align-items:start;\n  }\n  .body p{margin:0;}\n  .body p + p{margin-top:1.05em;}\n  /* caption under slideshow: project title (black) + what's shown (grey) */\n  .cap-desc{color:var(--ink-2);}\n  /* project-page template: sidebar + intro, then sections */\n  .sidebar div + div{margin-top:0;}\n  .sidebar .sp{height:1em;}\n  .sec-title em{font-style:italic;color:var(--ink-3);}\n  .pop-txt .sec{margin-top:1.9em;}\n  hr{border:0;border-top:1px solid rgba(0,0,0,0.22);margin:16px 0;}\n  .pop-txt hr{margin:2.6em 0 0.55em;}\n  .row-close{display:flex;justify-content:flex-end;}\n  .row-close a:hover{opacity:.7;}\n  .pop-txt .row-close + .txt-grid{margin-top:2.6em;}\n\n  /* ---------- ABOUT panel (right half) ---------- */\n  .about-panel{\n    position:fixed;top:0;left:50vw;\n    width:50vw;min-height:100dvh;\n    padding:var(--pad);\n    background:var(--bg);\n    font-size:var(--pop-size);line-height:1.32;\n    overflow:auto;-webkit-overflow-scrolling:touch;max-height:100dvh;\n  }\n  .about-top{display:grid;grid-template-columns:0.9fr 1.1fr;gap:var(--pad);align-items:start;}\n  .meta div{white-space:pre-line;}\n  .meta a:hover{opacity:.7;}\n  .cv-row{display:grid;grid-template-columns:0.9fr 1.1fr;gap:var(--pad);align-items:start;}\n  .cv-row .entry + .entry{margin-top:1.1em;}\n\n  /* ---------- mobile ---------- */\n  @media (max-width:760px){\n    .pop-img{width:calc(100vw - var(--pad)*2);}\n    .pop-txt{left:var(--pad);width:calc(100vw - var(--pad)*2);border-left:0;padding-left:0;background:var(--bg);\n      padding-bottom:calc(var(--pad) + env(safe-area-inset-bottom) + 96px);}\n    #overlay.expanded .pop-img{display:none;}\n    /* Expand is a desktop-only feature — hide the buttons and neutralise the\n       expand state entirely on mobile. */\n    .controls [data-expand],\n    .controls [data-collapse]{display:none !important;}\n    #overlay.expand{background:transparent;}\n    #overlay.expand .pop-img{width:calc(100vw - var(--pad)*2);left:var(--pad);top:var(--pad);transform:none;}\n    #overlay.expand .pop-txt{display:none;}\n    .about-panel{left:0;width:100vw;\n      padding-bottom:calc(var(--pad) + env(safe-area-inset-bottom) + 96px);}\n    .about-top,.cv-row,.txt-grid{grid-template-columns:1fr;}\n    .pop-txt .txt-grid > .body.intro{margin-top:1.5em;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n\n  <main class=\"index\" id=\"index\">\n    <div class=\"top\">\n      <a class=\"line\" href=\"#\" data-act=\"home\">Mattia Ambrosini<\u002Fa>\n      <a class=\"line\" href=\"#\" data-act=\"about\">About<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"bottom\">\n      <div id=\"projects\"><\u002Fdiv>\n      <div class=\"foot\">\n        <span class=\"line muted\" style=\"font-size: 13px\">Last Updated: <span id=\"clock\"><\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <div id=\"overlay\" aria-live=\"polite\"><\u002Fdiv>\n\n  <script>\n  (function(){\n    \"use strict\";\n\n    /* Home index: italic headers + clickable project lines (verbatim labels). */\n    var LIST = [\n      {head:'Exhibition / Installation / Event design'},\n      {label:'2026 – MYCELIA: Oltre il cappello', name:'MYCELIA: Oltre il cappello', type:'Exhibition design', key:'mycelia'},\n      {label:'2025 – ArTavola', name:'ArTavola', type:'Installation', key:'artavola'},\n      {label:'2025 – Circolando', name:'Circolando', type:'Installation', key:'circolando'},\n      {label:'2024 – EDICOLA21', name:'EDICOLA21', type:'Installation', key:'edicola21'},\n      {label:'2023 – Gut', name:'Gut', type:'Exhibition design', key:'gut'},\n      {head:'Product design'},\n      {label:'2026 – SECUNDA NATURA', name:'SECUNDA NATURA', type:'Product design', key:'secunda'},\n      {label:'2026 – Bodega', name:'Bodega', type:'Product design', key:'bodega'},\n      {label:'2026 – Meccano', name:'Meccano', type:'Product design', key:'meccano'},\n      {label:'2025 – Halma', name:'Halma', type:'Product design', key:'halma'}\n    ];\n    var PROJECTS = LIST.filter(function(x){ return !x.head; });\n\n    /* =========================================================================\n       PROJECT DATA  — one object per project, consumed by the reusable\n       project-page template (sidebar + intro + sections). Step 4 fills the\n       remaining keys; the template itself is defined once, below.\n    ========================================================================= */\n    var DATA = {\n      mycelia: {\n        title: 'MYCELIA: Oltre il cappello',\n        side: ['MYCELIA: Oltre il cappello','Exhibition concept','Pirelli Hangar Bicocca','Milano \\u2013 2026','',\"Master\\u2019s thesis supervisors\",\"Alessandro Colombo &amp; Franco Origoni\"],\n        captions: [\n          \"Entrance \\u2013 Dim threshold posing a question\",\n          \"Mycelium \\u2013 Introducing the organism and its networks\",\n          \"Mycelium \\u2013 Introducing the organism and its networks\",\n          \"Connections \\u2013 Mycorrhizae, lichens and forest networks\",\n          \"Connections \\u2013 Mycorrhizae, lichens and forest networks\",\n          \"Connections \\u2013 Mycorrhizae, lichens and forest networks\",\n          \"Transformations \\u2013 Hyphae decomposing dead organic matter\",\n          \"Transformations \\u2013 Hyphae decomposing dead organic matter\",\n          \"Invasions \\u2013 Parasitic strategies colonizing living hosts\",\n          \"Signals \\u2013 Olfactory, visual and electrical signals\",\n          \"Signals \\u2013 Olfactory, visual and electrical signals\",\n          \"Exit \\u2013 Carrying a fruiting fragment away\",\n          \"Floorplan \\u2013 Mycelium colonizing the Shed\",\n          \"Poster \\u2013 Mycelium-inspired graphics and lettering\"\n        ],\n        intro: [\n          \"When we think of a mushroom, we picture a cap: a reflex shaped by centuries of images that have only ever shown the fruiting body, the part that emerges from the ground, while leaving invisible the mycelium, the network of threads that makes up the real organism and lives hidden in the soil, in tree trunks, and in the tissues of other living things.\",\n          \"And yet it\\u2019s the mycelium that does half the planet\\u2019s work: it makes up a quarter of the Earth\\u2019s biomass, keeps almost ninety percent of plants alive, breaks down dead matter, and moves through the carbon and nitrogen cycles. A huge biological protagonist that visual culture has never made visible.\",\n          \"The exhibition grows out of this gap between how important the mycelium is and how invisible it remains, and it tries to close that gap by turning the usual way of telling nature\\u2019s story upside down. Instead of showing the mycelium from a distance, through photographs and models, it builds a space where the visitor finds themselves inside the organism and comes to know it by moving through it, wandering freely the way a hypha grows through the soil, with no fixed path and no single point from which to see it all.\",\n          \"Along the way, the visitor encounters the four ways the mycelium connects with the living world, mutualism, signaling, decomposition, and parasitism. Four independent logics, each with its own rules and consequences, which together keep the Earth\\u2019s ecosystems running.\"\n        ],\n        sections: [\n          {title:'Concept', short:'Assonometria del percorso espositivo',\n           text:\"Mycelia turns on its head the way we usually tell nature\\u2019s story: rather than observing the mycelium from outside, it builds a space you move through from within, as if the visitor became a hypha growing through the soil, with no fixed path and no privileged point of view. Along the way, visitors discover the four relationships through which the mycelium connects with the living world \\u2014 mutualism, signaling, decomposition, parasitism \\u2014 giving back scale and centrality to an organism that visual culture has always left invisible.\"},\n          {title:'Visitor\\u2019s route', short:'Pianta e flusso di visita', text:null},\n          {title:'Entrance', short:'Ingresso: tende e domanda iniziale',\n           text:\"The exhibition entrance is designed to draw the visitor into the space, immersing them in a dimension unlike anything they\\u2019re used to. The light is dim, the floor takes on a shape that isn\\u2019t immediately legible, and a single question emerges from one of the curtains: \\u201CWhat is a fungus?\\u201D\"},\n          {title:'Mycelium', short:'Spazio immersivo del micelio',\n           text:\"The first section answers the question posed at the entrance, introducing the visitor to the mycelium through four fundamental traits, told through projections that emerge from the curtains. At the center of the section, an immersive space shows the visitor how the mycelium develops, forming networks and connections with others of its kind.\"},\n          {title:'Connections', short:'Micorrize, licheni, Wood Wide Web',\n           text:\"Here the mycelium\\u2019s bonds with other organisms take center stage, as it builds shared structures with them. Visitors move through mycorrhizae, the symbiosis that feeds over 90% of the world\\u2019s land plants; lichens, where fungus and alga merge into a new organism; and the Wood Wide Web, the underground network linking the trees of a forest.\"},\n          {title:'Transformations', short:'Gli stadi della decomposizione',\n           text:\"This part of the exhibition looks at the mycelium as the primary decomposer of terrestrial ecosystems. Hyphae secrete enzymes that break down dead matter (wood, leaves, carcasses) returning their elements to the cycle of life. Three separate points along the path trace the stages of decomposition, closing with the case of wood, to show what happens when fungi are absent from this process.\"},\n          {title:'Invasions', short:'Le strategie parassitarie',\n           text:\"Here the focus shifts to the mycelium that penetrates a living organism to exploit it, not an exchange, but a one-way, extractive relationship, often lethal. Visitors move through the three parasitic strategies (biotrophic, necrotrophic, hemibiotrophic) illustrated through case studies in which the host is colonized. Here the visitor comes to understand how the mycelium reshapes the creatures it invades, molding them to its own ends.\"},\n          {title:'Signals', short:'Segnali olfattivi, visivi ed elettrici',\n           text:\"Moving on, the exhibition turns to the mycelium\\u2019s signals (olfactory, visual, and electrical) picked up by other organisms. Scents that draw in insects and mammals, lights tuned to nocturnal rhythms, impulses that travel along the hyphae. None of these messages is addressed to humans specifically: each speaks to an unknown recipient, seeking some benefit of its own.\"},\n          {title:'Exit', short:'Blocchi fruttiferi da riattivare',\n           text:\"The final section closes the route by handing the mycelium back to the visitor. Having moved through it from within, here they carry away a fragment of it: fruiting blocks to reactivate at home, where the mycelium begins growing again. This mycelium, too, wants to expand, and it does so through space.\"}\n        ]\n      },\n\n      artavola: {\n        side: ['ArTavola','Exhibition & installation concept','Milan Central Station + Miart','Milano \\u2013 2025','','Professor','Angelo Jelmini'],\n        intro: [\n          \"The ArTavola project is conceived as a multidisciplinary intervention merging architecture, urban art, and participatory practices both within and outside the MiArt fair. Originating from the ambition to transform public spaces into sites of interaction and community engagement, the project initially materializes in Piazza Duca d\\u2019Aosta. Here, a hybrid urban installation blending a skate park and communal space invites reflection on collective uses of urban land.\",\n          \"The narrative extends into MiArt\\u2019s interior spaces, divided into two interconnected environments: the VIP Lounge, showcasing sponsor Supreme\\u2019s identity through curated iconic skate-culture objects, and a publicly accessible exhibition room presenting the project systematically. This exhibition employs graphics, physical models, video content, and artworks from artists selected via an open call, highlighting the project\\u2019s central themes: conviviality, collaboration, and cross-pollination between creative disciplines.\",\n          \"The collaboration with artist and graffiti writer Smash137, in partnership with Montana Cans, reinforces the intersection of street art and institutional recognition, introducing within the fair a profound exploration of graffiti\\u2019s cultural value. The exhibition design mirrors the material and visual language of the outdoor intervention, emphasizing the project\\u2019s core intention: connecting diverse spaces and formats through a cohesive and approachable narrative.\"\n        ],\n        sections: [],\n        captions: [\n          \"Piazza Duca d\\u2019Aosta, Milan Central Station \\u2013 Hybrid skate park and communal space\",\n          \"Piazza Duca d\\u2019Aosta, Milan Central Station \\u2013 Hybrid skate park and communal space\",\n          \"Allianz MiCo, Milan \\u2013 Custom graphics and decorations outside the venue\",\n          \"VIP Lounge, Miart \\u2013 \\u201cArt On Deck\\u201d, an exhibition on Supreme\\u2019s artistic skateboards\",\n          \"VIP Lounge, Miart \\u2013 \\u201cArt On Deck\\u201d, an exhibition on Supreme\\u2019s artistic skateboards\",\n          \"VIP Lounge, Miart \\u2013 \\u201cArTavola\\u201d, an exhibition on the project\\u2019s process\",\n          \"VIP Lounge, Miart \\u2013 \\u201cArTavola\\u201d, an exhibition on the project\\u2019s process\",\n          \"Cubes \\u2013 Graphic design and lettering\"\n        ]\n      },\n\n      circolando: {\n        side: ['Circolando','Exhibition & installation concept','Former Roman Circus Mediolanum site','Milano \\u2013 2025','','Professors','Alessandro Colombo & Franco Origoni'],\n        intro: [\n          \"Circolando is an urban installation project designed to evoke the memory of Milan\\u2019s ancient Roman Circus\\u2014a vanished landmark that profoundly shaped the city\\u2019s history. Integrating into the contemporary urban fabric, the project employs visual and sensory language, utilizing scale, color, and sound to capture attention and momentarily disrupt everyday routines.\"\n        ],\n        sections: [\n          {title:'Concept', text:\"The name \\u201CCircolando\\u201D blends \\u201Ccircus\\u201D with the concept of movement, symbolizing a dynamic exploration of Milan\\u2019s Magenta neighborhood. It encourages residents to rediscover their city by reconnecting with forgotten places and stories, fostering new interactions with public spaces. Conceived as an urban game, the installation reinterprets figures and actions once central to the circus, presenting them in a contemporary light. Oversized, visually striking elements appear unexpectedly, challenging familiar perceptions of urban spaces.\"},\n          {title:'Route', text:\"Each point along the route integrates sound, color, and form inspired by circus aesthetics, transforming the experience into an immersive narrative. Circus characters (jugglers, acrobats, and animals) are reimagined as symbolic installations that pique curiosity and encourage active participation. Beyond mere historical remembrance, Circolando serves as a bridge linking past and present, creatively reinterpreting collective memory through art and design.\"}\n        ],\n        captions: [\n          \"Logo and public billboard design\",\n          \"Museo Civico Archeologico, Milan \\u2013 Roman-era tower of the Mediolanum circus\",\n          \"Via Ansperto 5 \\u2013 Installation on the emperor\",\n          \"Carrobbio \\u2013 Installation on the chariot\",\n          \"Via Cappuccio \\u2013 One of ten arches placed across the area\",\n          \"Via Sant\\u2019Orsola \\u2013 Installation on the spina, turned into a children\\u2019s park\",\n          \"Via Circo \\u2013 Remains of the circus curve, revealed and retold\",\n          \"Via Cappuccio \\u2013 Night view of an arch\",\n          \"Via Cappuccio \\u2013 The circus tower and the project explained\",\n          \"Via Cappuccio \\u2013 Installation on the gladiators\",\n          \"Example of an urban poster\",\n          \"Map and placement of the installations across the circus area\"\n        ]\n      },\n\n      edicola21: {\n        side: ['EDICOLA21','Installation concept','Mons. Dughera Square','Mortara (PV) \\u2013 2024','','Bachelor\\u2019s thesis supervisor','Anna Anzani'],\n        intro: [\n          \"EDICOLA21 is an architectural reinterpretation of the traditional newspaper kiosk, aiming to preserve its historical value while updating its form and function.\",\n          \"The project introduces an octagonal structure that evokes the collective memory of the kiosk, yet redefines its identity as a space for interaction, rest, and cultural production.\"\n        ],\n        sections: [\n          {title:'Structure and use', text:\"The kiosk has a dual nature: when closed, it appears as a silent, monochromatic, sculptural object \\u2014 a \\u201Cmonument to itself\\u201D that pays tribute to a fading urban lifestyle. When opened, it reveals its active soul: a space dedicated to independent print culture, social exchange, and public rest. Although physically detached from the connected Speakeasy project, EDICOLA21 shares its core design principle of transformation: a mutable fa\\u00e7ade that shifts according to use. Around the central structure, tables and seats echo the octagonal geometry, expanding the function of the kiosk into the public realm and reinforcing the idea of intentional urban occupation.\"}\n        ],\n        captions: [\n          \"Closed structure with an encrypted sign\",\n          \"Basic function \\u2013 selling newspapers and drinks\",\n          \"Urban exhibition \\u2013 shutters turned into display cases\",\n          \"DJ set \\u2013 the kiosk becomes a booth, concealing a sound system\",\n          \"Axonometric \\u2013 basic use\",\n          \"Axonometric \\u2013 exhibition\",\n          \"Axonometric \\u2013 DJ set\",\n          \"Examples of urban posters\"\n        ]\n      },\n\n      gut: {\n        side: ['Gut','Exhibition concept','Impluvium, Triennale Milano','Milano \\u2013 2023','','Professors','Franco Origoni, Marcello Galbiati & Luca Vivanti'],\n        intro: [\n          \"Gut is an exhibition design project dedicated to Dieter Rams and his work with Braun. The show unfolds across six distinct spaces, each with its own spatial and sensory identity, named according to the same logic Braun used to label its products. Rather than explaining minimalism, the design stages it, letting the visitor move through its gradual unfolding.\"\n        ],\n        sections: [\n          {title:'Concept', text:\"The exhibition builds a progression from an initial chaos, a mirror of the pop capitalism of the 1960s, to the calm of minimalism. This evolution rests on two inversely proportional elements: light, which grows along the route, and sound, which fades. Visitors move from the dark, noisy first room to the peak of light and silence in the core space, turning the shift from disorder to purity into a spatial experience.\"},\n          {title:'Visitor\\u2019s route', text:null},\n          {title:'Eingang', text:\"A white cube acts as the show\\u2019s \\u201Ccover\\u201D: outside, a spare graphic hints at its minimalist identity; inside, the historical framing of the pop, capitalist 1960s begins, the antithesis of Rams. Here the visitor puts on the shoe covers needed to enter the white spaces.\"},\n          {title:'Zimmer 1', text:\"A dark, dense space where a single spotlight lights up the objects on display one by one: each switches on and emits a sound, building toward a maximum overlap of noise. Without any explanation, the room conveys the \\u201Cchaos\\u201D of pop, disorienting the visitor just as the advertising of the era once did.\"},\n          {title:'Zimmer 2', text:\"After the chaos, a moment of rest. The dichotomy between pop and minimalism is introduced through a visual comparison: on one side, vibrant color; on the other, refined simplicity. A television from the previous room, disassembled and mounted on the wall, becomes a symbol of the essential.\"},\n          {title:'Zimmer 3', text:\"A further step toward minimalism, with the spaces growing barer. At the center, a display shaped like the famous T3 dial points intermittently to ten of Rams\\u2019s sketches, while the wall lights up with the keyword of each of his ten principles of good design.\"},\n          {title:'Zimmer 4', text:\"The central room, where the concept and the brand\\u2019s philosophy merge. White walls, floors, and ceilings strip away every distraction, letting the objects speak. The Braun products, displayed without labels, cast onto the floor the shadow of one of Rams\\u2019s most iconic graphics, that of the RT20 radio.\"},\n          {title:'Zimmer 5', text:\"A comparison between past and present. The space borrows the icons and cantilevered displays of the Apple Store, wryly pairing an Apple product with the Rams x Braun object that inspired it. Here the visitor removes the shoe covers and moves on.\"}\n        ],\n        captions: [\n          \"Eingang \\u2013 White cube framing the 1960s\",\n          \"Zimmer 1 \\u2013 Spotlit objects building to chaos\",\n          \"Zimmer 2 \\u2013 Pop versus minimalism\",\n          \"Zimmer 3 \\u2013 The T3 dial and ten principles\",\n          \"Zimmer 4 \\u2013 Braun objects and the RT20 shadow\",\n          \"Zimmer 5 \\u2013 Apple Store comparison\",\n          \"Poster \\u2013 Graphic design\",\n          \"Milan Cadorna Station \\u2013 Urban billboards\"\n        ]\n      },\n\n      secunda: {\n        side: ['Secunda Natura. Nothing Here is Just a Wall','Product','Salone Raritas @ Salone del Mobile','21 - 26 April 2026, Milan Design Week','','Parasite 2.0 x Bianco67','Design team: Luca Marullo, Eugenio Cosentino, Stefano Colombo, Noemi Giussani, Fabio Lucietto, Antoni Martorell, Mattia Ambrosini'],\n        intro: [\n          \"For the first edition of Salone Raritas \\u2014 the new Salone del Mobile.Milano platform dedicated to collectible design and high-end craftsmanship \\u2014 Bianco67 presents Secunda Natura, developed with the design and research studio Parasite 2.0. The project reactivates stone fragments normally discarded in production, turning reclaimed travertine into structural and expressive elements. The result is a modular system of pieces sitting between object and architecture \\u2014 a wall-mounted element with integrated functions, a vertical element with a mirror, and a coffee table \\u2014 that suggest uses without rigidly defining them.\",\n          \"Ph. Luca Caizzi\"\n        ],\n        sections: [\n          {title:'Approach', text:\"Secunda Natura builds on the XC Objects series, shown between 2024 and 2025 in Milan, Miami and Naples. Six-axis robotic fabrication pushes the stone to an almost artisanal level of precision, creating a dialogue between innovation and decorative tradition. Surfaces carry patterns evoking classical, marine imagery, while the travertine \\u2014 from white and yellow to warmer, reddish tones \\u2014 builds a layered material narrative, and steel inserts let the system scale from furniture to architecture. Underlying it all is a reflection on waste: discarded travertine reinterpreted as both a resource and a trace of how production, image and taste are changing.\"},\n          {title:'Collaboration', text:\"The partnership between Bianco67 and Parasite 2.0 grows out of an ongoing dialogue between technical expertise and design inquiry: on one side the company\\u2019s command of craft, technology and production, on the other the studio\\u2019s speculative approach to how we inhabit space. Together they give natural stone a renewed centrality in contemporary design, turning the production process itself into expressive content.\"}\n        ],\n        captions: [\n          \"Booth 4 \\u2013 Salone Raritas, Salone del Mobile 2026\",\n          \"Booth 4 \\u2013 Salone Raritas, Salone del Mobile 2026\",\n          \"Booth 4 \\u2013 Salone Raritas, Salone del Mobile 2026\",\n          \"Wall panel 1 \\u2013 White travertine marble and stainless steel\",\n          \"Wall panel 1 \\u2013 Detail\",\n          \"Wall panel 1 \\u2013 Detail\",\n          \"Wall panel 1 \\u2013 Bright side\",\n          \"Wall panel 1 \\u2013 Dark side\",\n          \"Wall panel 1 \\u2013 Detail\",\n          \"Wall panel 2 \\u2013 Red travertine marble, stainless steel and flowers\",\n          \"Wall panel 2 \\u2013 Detail\",\n          \"Wall panel 2 \\u2013 Detail\",\n          \"Wall panel 2 \\u2013 Sculpting process\",\n          \"Wall panel 2 \\u2013 Sculpting process, detail\",\n          \"Wall panel 1 and coffee table\",\n          \"Coffee table \\u2013 Vatican white travertine marble and stainless steel\",\n          \"Coffee table \\u2013 Detail\",\n          \"Coffee table \\u2013 Detail\",\n          \"Coffee table \\u2013 Sculpting robot shaping the tabletop\"\n        ]\n      },\n\n      bodega: {\n        side: ['Bodega \\u2013 cabinet','Product','ArchiThoughts\\u2013ArchiTouch','FENIX\\u00ae Scenario, 21 - 26 April 2026, Milan Design Week','','Design team: Luca Marullo, Eugenio Cosentino, Stefano Colombo, Mattia Ambrosini'],\n        intro: [\n          \"Bodega \\u2013 Cabinet was developed by Parasite 2.0 for the third chapter of ArchiThoughts\\u2013ArchiTouch, curated by Federica Sala at FENIX Scenario during Milan Design Week 2026. The piece takes mobile street-food structures and multifunctional domestic furniture as its starting points, working through the idea of micro-architecture as something that shapes social interaction \\u2014 an object that reorganizes the space around it and sits between body, object and environment.\",\n          \"Artwork by Iacopo Costanzo \\u2014 Ph. Claudia Zalla\"\n        ],\n        sections: [\n          {title:'Structure', text:\"The cabinet works as a multi-use element, closer to the tradition of large furnishing pieces that structure a room at a reduced architectural scale than to a standalone object. It also served as a way to test Arpa\\u2019s materials: bending and stressing them to see how far they could be pushed formally, and working with their relationship to light to obtain surfaces that diffuse illumination \\u2014 in some cases becoming light sources in themselves.\"},\n          {title:'Exhibition', text:\"ArchiThoughts\\u2013ArchiTouch is presented by Arpa\\u00ae together with the Broadview Materials brands FENIX\\u00ae, Formica\\u00ae, Homapal\\u00ae and Getacore\\u00ae. The exhibition gathers six international studios \\u2014 Marion Mailaender, Parasite 2.0, RedDuo Studio, STORAGEMILANO, Studio GGSV and ZIMMER \\u2014 within an installation designed by (AB)NORMAL. ArchiThoughts\\u2013ArchiTouch | Milan Design Week 2026 \\u2014 Curated by Federica Sala \\u2014 April 14th \\u2013 26th \\u2014 FENIX Scenario, Foro Buonaparte 66, Milan\"}\n        ],\n        captions: [\n          \"Cabinet \\u2013 Front view\",\n          \"Cabinet \\u2013 Back view, artwork by Jacopo Costanzo\",\n          \"Cabinet \\u2013 Detail\",\n          \"Cabinet \\u2013 Detail\",\n          \"Cabinet \\u2013 ArchiThoughts, ArchiTouch 2026\",\n          \"Cabinet \\u2013 ArchiThoughts, ArchiTouch 2026\"\n        ]\n      },\n\n      meccano: {\n        side: ['Meccano furniture system','Product concept','2025','','Designed by me'],\n        intro: [\n          \"During my internship at Parasite 2.0, while the studio was developing the new concept for the collaboration with Bianco67, I worked on this furniture system built around metallic joints that connect travertine elements into larger pieces.\",\n          \"Reclaimed travertine carries the mass and surface, machined steel carries the structure, and the two materials stay legible even where they meet. From this shared vocabulary of stone blocks and star-splined joints, I developed a small family of pieces, a table, a vertical screen, suspended and floor lights, and a console, as variations on the same grammar.\"\n        ],\n        sections: [\n          {title:'System', text:\"The system rests on a single detail: a star-splined steel connector housed in the rounded terminals of each stone block. The fluted profile lets the elements lock at fixed angular steps, so each connection can be rotated and set in a different position, turning a static junction into an adjustable pivot, and one set of parts into many possible configurations. The joint shifts role across the collection: it grounds and levels the table, holds the stacked panels of the screen, suspends the luminous tube in the lights, and in the console appears at every junction as the visible ornament of the object.\"},\n          {title:'', text:\"Images made with Blender\\u00ae\"}\n        ],\n        captions: [\n          \"The full furniture collection built on the system\",\n          \"System detail \\u2013 the \\u201cstar\\u201d metal joint in the stone\"\n        ]\n      },\n\n      halma: {\n        side: ['Halma glasses','Product concept','2024','','Designed by me'],\n        intro: [\n          \"Halma is a set of glasses designed to work in two ways: on their own, or slotted into a marble base that holds them as a group. Each glass has a base shaped into small hemispheres, a detail that lets it stand stably on any surface while also locking into the tray, a slab of Verde Alpi marble carved with matching hemispherical hollows. Together they form a piece that keeps the glasses in order, makes them easy to carry, and doubles as a centerpiece.\"\n        ],\n        sections: [\n          {title:'Details', text:\"The whole project rests on a single geometric detail: the domed underside of each glass. The rounded feet keep the glass steady when it stands alone, and the same shape drops into the carved seats of the tray, so nine glasses align into a compact grid.\"},\n          {title:'', text:\"The tray isn\\u2019t just storage but an object in its own right, the deep green marble against the clear glass turns a functional holder into a table decoration. The name Halma comes from the game that inspired Chinese checkers, played with rounded pegs that settle into hemispherical holes, the same fit between sphere and hollow that defines how the glasses meet their base.\"},\n          {title:'', text:\"Images made with Blender\\u00ae\"}\n        ],\n        captions: [\n          \"Set of glasses in the custom-made tray\",\n          \"Top view\",\n          \"Detail of a single glass, filled with beer\"\n        ]\n      }\n    };\n    function projectData(p){\n      var d = p.key && DATA[p.key];\n      if(d) return d;\n      /* graceful fallback until Step 4 fills the data in */\n      return { title:p.name, side:[p.name, p.type], intro:[], sections:[], captions:[] };\n    }\n\n    var BODY_A = [\n      'Vestibulum et dignissim magna. Nullam at ultrices felis. Suspendisse facilisis sagittis sem sit amet tempor. Nam sit amet nibh et enim laoreet porta sit amet vel purus. Maecenas augue velit, feugiat in maximus id, auctor vel ex. Integer placerat massa nec tellus convallis aliquet.',\n      'Nam lobortis lectus mi, vel molestie neque dictum at. Vivamus sed sapien fermentum, fermentum metus ut, efficitur nunc.',\n      'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut nisl metu tum sapien in, suscipit massa. Integer luctus sagittis urna et porta. Quisque a gravida nibh, eget aliquam enim. Etiam dapibus eros ultrices, pellentesque diam id, mattis enim. Suspendisse quis odio efficitur, posuere lorem eu, maximus lectus. In cursus ut turpis sed malesuada. Curabitur a molestie nisi.'\n    ];\n\n    function paras(arr){ return arr.map(function(p){return '<p>'+p+'<\u002Fp>';}).join(''); }\n    function lineLabel(p){ return p.label; }\n\n    /* ---------- build home list ---------- */\n    var wrap = document.getElementById('projects');\n    LIST.forEach(function(item){\n      if(item.head){\n        var h = document.createElement('div');\n        h.className = 'line head-cat';\n        h.innerHTML = '<em><\u002Fem>';\n        h.firstChild.textContent = item.head;\n        wrap.appendChild(h);\n        return;\n      }\n      var a = document.createElement('a');\n      a.className = 'line';\n      a.href = '#';\n      a.setAttribute('data-act','project');\n      a.setAttribute('data-i', PROJECTS.indexOf(item));\n      var m = item.label.split(/\\s\\u2013\\s/);\n      if(m.length > 1){\n        a.appendChild(document.createTextNode(m[0]+' \\u2013 '));\n        var u = document.createElement('u');\n        u.textContent = m.slice(1).join(' \\u2013 ');\n        a.appendChild(u);\n      } else {\n        a.textContent = item.label;\n      }\n      wrap.appendChild(a);\n    });\n\n    /* Preload every project's images in the background so opening a project\n       is instant (no per-click fetch delay). Runs when the browser is idle,\n       one project at a time, and pre-decodes each image so the first frame\n       paints immediately. */\n    (function prefetchImages(){\n      function go(){\n        PROJECTS.forEach(function(_, i){\n          ssLoadKey('p' + (i + 1)).then(function(urls){\n            (urls || []).forEach(function(u){ var im = new Image(); im.src = u; });\n          }).catch(function(){});\n        });\n      }\n      if(window.requestIdleCallback) requestIdleCallback(go, {timeout:1200}); else setTimeout(go, 500);\n    })();\n\n    /* ---------- overlay machinery ---------- */\n    var overlay = document.getElementById('overlay');\n    var slideTimer = null;\n    var capTimer = null;\n\n    function clear(){\n      if(slideTimer){ clearInterval(slideTimer); slideTimer = null; }\n      if(capTimer){ clearInterval(capTimer); capTimer = null; }\n      overlay.className = '';\n      overlay.innerHTML = '';\n      document.body.style.overflow = '';\n    }\n    function closeAll(){ clear(); }\n    function closeTxt(){ overlay.classList.remove('expanded'); }\n\n    /* click in the void → close both */\n    overlay.addEventListener('click', function(e){\n      if(e.target === overlay) closeAll();\n    });\n    document.addEventListener('keydown', function(e){\n      if(e.key === 'Escape') closeAll();\n    });\n\n    /* caption slot under the slideshow (filled by startCaptionCycle) */\n    function creditImg(){\n      return '<div class=\"credit\" id=\"cap-sec\"><\u002Fdiv>';\n    }\n    /* caption under the slideshow: painted in lock-step with the image cycle.\n       No own timer — ssCycle drives the shared index so image N always shows\n       caption N. */\n    var capPaint = null;   // function(idx) set up per open project\n    function startCaptionCycle(title, caps){\n      var el = overlay.querySelector('#cap-sec');\n      capPaint = null;\n      if(!el) return;\n      capPaint = function(idx){\n        var cap = caps.length ? caps[idx % caps.length] : '';\n        el.innerHTML = '<div class=\"cap-title\">' + title + '<\u002Fdiv>' +\n                       (cap ? '<div class=\"cap-desc\">' + cap + '<\u002Fdiv>' : '');\n      };\n      capPaint(0);\n    }\n\n    /* ---------- slideshow store — per-image sidecars + manifest ----------\n       The host only lets us persist small, pre-existing '*.state.json' files\n       whose name has NO extra dots. So instead of one huge inline store we use:\n         - manifest  '.slideshow.state.json'          = { key: imageCount }\n         - one image  '.slideshow-<key>-<i>.state.json' = { u:<dataURL> }\n       Each file stays well under the size cap. Images are baked as JPEG. */\n    var SS_MANIFEST = 'assets/slideshow.json';\n    var SS_SLOTS = {p1:40,p2:40,p3:40,p4:40,p5:40,p6:40,p7:40,p8:40,p9:40}; // pre-created capacity/project\n    function ssSlots(key){ return SS_SLOTS[key] || 40; }\n    function ssImgFile(key,i){ return 'assets/slideshow-'+key+'-'+i+'.json'; }\n\n    var ssStore = {};                 // key -> [dataURL,...] in memory\n    var ssManifest = null;            // cached only on success\n    var ssKeyP = {};                  // in-flight loads, deduped per key\n    // Fetch a sidecar with retries — the editor preview can drop the first\n    // request before its auth token is ready; failures must not be cached.\n    function ssFetchJSON(name, tries){\n      tries = tries==null ? 4 : tries;\n      var opts = (window.omelette && window.omelette.writeFile) ? {cache:'no-store'} : {};\n      return fetch(name, opts)\n        .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); })\n        .catch(function(){\n          if(tries<=1) return null;\n          return new Promise(function(res){ setTimeout(res,300); })\n            .then(function(){ return ssFetchJSON(name, tries-1); });\n        });\n    }\n    function ssLoadManifest(){\n      if(ssManifest) return Promise.resolve(ssManifest);\n      return ssFetchJSON(SS_MANIFEST).then(function(j){\n        if(j && typeof j==='object'){ ssManifest = j; return j; }\n        return {};   // transient miss: don't cache, retry on next open\n      });\n    }\n    function ssLoadKey(key){\n      if(ssStore[key] && ssStore[key].length) return Promise.resolve(ssStore[key]);\n      if(ssKeyP[key]) return ssKeyP[key];\n      var p = ssLoadManifest().then(function(m){\n        var n = m[key]|0, reqs = [];\n        if(!n){ ssStore[key] = []; return ssStore[key]; }\n        for(var i=0;i<n;i++){ (function(idx){\n          reqs.push(ssFetchJSON(ssImgFile(key,idx)).then(function(j){ return j && j.u ? j.u : null; }));\n        })(i); }\n        return Promise.all(reqs).then(function(urls){\n          ssStore[key] = urls.filter(Boolean);\n          return ssStore[key];\n        });\n      });\n      p.then(function(a){ if(!a || !a.length) delete ssKeyP[key]; }, function(){ delete ssKeyP[key]; });\n      ssKeyP[key] = p;\n      return p;\n    }\n\n    /* ---- writes (editor only) ---- */\n    function ssWrite(name, obj){\n      var w = window.omelette && window.omelette.writeFile;\n      if(!w) return Promise.resolve();\n      return Promise.resolve(w(name, JSON.stringify(obj))).catch(function(){});\n    }\n    // Persist one project's images to per-image sidecars, then update manifest.\n    function ssSave(key){\n      var w = window.omelette && window.omelette.writeFile;\n      if(!w) return Promise.resolve();\n      if(!key){ return Promise.all(Object.keys(ssStore).map(function(k){ return ssSave(k); })); }\n      var arr = ssStore[key] || [], cap = ssSlots(key);\n      var prev = (ssManifest && ssManifest[key]) || 0;\n      var wrote = Math.min(arr.length, cap), chain = Promise.resolve();\n      for(var i=0;i<wrote;i++){ (function(idx){\n        chain = chain.then(function(){ return ssWrite(ssImgFile(key,idx), {u:arr[idx]}); });\n      })(i); }\n      for(var j=wrote;j<Math.min(prev,cap);j++){ (function(idx){   // clear freed slots\n        chain = chain.then(function(){ return ssWrite(ssImgFile(key,idx), {}); });\n      })(j); }\n      return chain.then(function(){\n        ssManifest = ssManifest || {};\n        ssManifest[key] = wrote;\n        return ssWrite(SS_MANIFEST, ssManifest);\n      });\n    }\n    function ssEncode(file){\n      return createImageBitmap(file).then(function(bm){\n        var cap=1400, scale=Math.min(1, cap/Math.max(bm.width,bm.height));\n        var w=Math.max(1,Math.round(bm.width*scale)), h=Math.max(1,Math.round(bm.height*scale));\n        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;\n        var ctx=cv.getContext('2d');\n        ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);   // flatten alpha (jpeg fallback)\n        ctx.drawImage(bm,0,0,w,h);\n        if(bm.close) bm.close();\n        var webp = cv.toDataURL('image/webp',0.82);\n        return webp.indexOf('image/webp')>-1 ? webp : cv.toDataURL('image/jpeg',0.82);\n      });\n    }\n    /* shared with the (removable) edit layer */\n    window.__ss = { store:ssStore, save:ssSave, encode:ssEncode, render:ssRender, cycle:ssCycle, loadKey:ssLoadKey, slots:ssSlots };\n\n    function slideshowHTML(i){\n      return '<div class=\"slideshow\" data-key=\"p'+(i+1)+'\"><\u002Fdiv>';\n    }\n    function ssRender(box){\n      var key=box.getAttribute('data-key');\n      var imgs=ssStore[key]||[];\n      box.querySelectorAll('img.slide').forEach(function(n){ n.remove(); });\n      var frag=document.createDocumentFragment();\n      imgs.forEach(function(u,idx){\n        var im=document.createElement('img');\n        im.className='slide'; im.src=u; im.alt='';\n        im.style.display = idx===0 ? 'block' : 'none';\n        frag.appendChild(im);\n      });\n      box.insertBefore(frag, box.firstChild);\n    }\n    // Show a specific slide index (wraps) and keep the caption in lock-step.\n    function ssShow(box, i){\n      var slides=[].slice.call(box.querySelectorAll('img.slide'));\n      if(!slides.length) return;\n      i = ((i % slides.length) + slides.length) % slides.length;\n      slides.forEach(function(s,k){ s.style.display = k===i ? 'block' : 'none'; });\n      box.__idx = i;\n      if(capPaint) capPaint(i);\n    }\n    function ssAdvance(box, step){ ssShow(box, (box.__idx||0) + step); }\n    // (re)start the automatic 3s cycle for the open slideshow\n    function ssAuto(box){\n      if(slideTimer){ clearInterval(slideTimer); slideTimer=null; }\n      var slides=box.querySelectorAll('img.slide');\n      if(slides.length<=1) return;\n      slideTimer=setInterval(function(){ ssAdvance(box, 1); }, 3000);\n    }\n    function ssCycle(box){\n      box.__idx = 0;\n      // Manual navigation: click the image to move (left third = previous,\n      // rest = next). Bound once; skipped while the edit layer owns clicks.\n      if(!box.__navBound){\n        box.__navBound = true;\n        box.addEventListener('click', function(e){\n          if(box.hasAttribute('data-edit')) return;   // edit layer handles clicks\n          var r = box.getBoundingClientRect();\n          var back = (e.clientX - r.left) < r.width * 0.3;\n          ssAdvance(box, back ? -1 : 1);\n          ssAuto(box);   // restart autoplay after a manual jump\n        });\n      }\n      if(!box.hasAttribute('data-edit')) box.classList.add('sl-nav');\n      ssAuto(box);\n    }\n    function ssExpected(key){ return ssManifest ? (ssManifest[key]|0) : -1; }\n    // Load with self-healing retries: the editor preview can take several\n    // seconds before sidecar fetches are authorised, so keep retrying until\n    // we actually have the manifest's expected images (or it truly says 0).\n    function ssEnsureLoaded(key, tries){\n      tries = tries||0;\n      return ssLoadKey(key).then(function(urls){\n        var expected = ssExpected(key);\n        var ok = (expected===0) || (expected>0 && urls && urls.length>=expected) || (urls && urls.length>0 && expected<0);\n        if(ok || tries>=15) return urls||[];\n        delete ssStore[key];   // force a fresh fetch next round\n        return new Promise(function(res){ setTimeout(res,500); })\n          .then(function(){ return ssEnsureLoaded(key, tries+1); });\n      });\n    }\n    function startSlideshow(){\n      var box = overlay.querySelector('.slideshow');\n      if(!box) return;\n      ssEnsureLoaded(box.getAttribute('data-key')).then(function(){\n        if(overlay.querySelector('.slideshow') !== box) return;  // user navigated away\n        if(window.__slideshowEditor){ window.__slideshowEditor(box); ssCycle(box); }\n        else { ssRender(box); ssCycle(box); }\n      });\n    }\n    /* ---------- reusable project-page template (right popup) ---------- */\n    function projectTemplateHTML(d){\n      var sidebar =\n        '<div class=\"credit sidebar\">'+\n          (d.side||[]).map(function(l,idx){\n            if(l==='') return '<div class=\"sp\"><\u002Fdiv>';\n            if(idx===1) return '<div><em>'+l+'<\u002Fem><\u002Fdiv>';\n            return '<div>'+l+'<\u002Fdiv>';\n          }).join('')+\n        '<\u002Fdiv>';\n      var sections = (d.sections||[]).map(function(s){\n        return '<div class=\"txt-grid sec\">'+\n            '<div class=\"sec-title\">'+s.title+'<\u002Fdiv>'+\n            '<div class=\"body\">'+ (s.text ? '<p>'+s.text+'<\u002Fp>' : '') +'<\u002Fdiv>'+\n          '<\u002Fdiv>';\n      }).join('');\n      return ''+\n        '<div class=\"txt-grid\">'+\n          sidebar+\n          '<div class=\"body intro\">'+ paras(d.intro||[]) +'<\u002Fdiv>'+\n        '<\u002Fdiv>'+\n        '<hr>'+\n        '<div class=\"row-close\"><a data-close=\"txt\">(Close)<\u002Fa><\u002Fdiv>'+\n        sections;\n    }\n\n    function openProject(i){\n      var p = PROJECTS[i];\n      var d = projectData(p);\n      var controls = '<div class=\"controls\">'+\n        '<a data-expand=\"1\">(Expand)<\u002Fa><a data-collapse=\"1\">(Collapse)<\u002Fa>'+\n        '<a data-more=\"1\">(More\\u2026)<\u002Fa><a data-close=\"all\">(Close)<\u002Fa>'+\n        '<\u002Fdiv>';\n      overlay.innerHTML =\n        '<div class=\"pop pop-img\">'+\n          slideshowHTML(i)+\n          '<div class=\"cap\">'+\n            creditImg()+\n            controls+\n          '<\u002Fdiv>'+\n        '<\u002Fdiv>'+\n        '<div class=\"pop pop-txt\">'+\n          projectTemplateHTML(d)+\n        '<\u002Fdiv>';\n      overlay.className = window.matchMedia('(min-width:761px)').matches ? 'open expand' : 'open';\n      document.body.style.overflow = 'hidden';\n      startSlideshow();\n      startCaptionCycle((d.side&&d.side[0])||d.title, d.captions || []);\n\n      var ex = overlay.querySelector('[data-expand]');\n      if(ex) ex.addEventListener('click', function(e){ e.preventDefault(); overlay.classList.remove('expanded'); overlay.classList.add('expand'); });\n      var co = overlay.querySelector('[data-collapse]');\n      if(co) co.addEventListener('click', function(e){ e.preventDefault(); overlay.classList.remove('expand'); });\n\n      overlay.querySelector('[data-more]').addEventListener('click', function(e){\n        e.preventDefault(); overlay.classList.remove('expand'); overlay.classList.add('expanded');\n      });\n      overlay.querySelectorAll('[data-close]').forEach(function(c){\n        c.addEventListener('click', function(e){\n          e.preventDefault();\n          if(c.getAttribute('data-close') === 'txt') closeTxt();\n          else closeAll();\n        });\n      });\n    }\n\n    /* ---------- about panel ---------- */\n    function openAbout(){\n      overlay.innerHTML =\n      '<div class=\"about-panel\">'+\n        '<div class=\"about-top\">'+\n          '<div class=\"meta credit\">'+\n            '<div>Mattia Ambrosini<\u002Fdiv>'+\n            '<div>Exhibition &amp; Interior designer<\u002Fdiv>'+\n            '<div>Milan<\u002Fdiv>'+\n            '<div><a href=\"mailto:ambrosini.mattia@yahoo.it\">ambrosini.mattia@yahoo.it<\u002Fa><\u002Fdiv>'+\n            '<div><a href=\"https://www.instagram.com/ambrosinimattia/\">@ambrosinimattia<\u002Fa><\u002Fdiv>'+\n          '<\u002Fdiv>'+\n          '<div class=\"body\"><p>I\\u2019m a 24-year-old designer based in Milan, working between exhibition design and visual identity.<\u002Fp><p>I trained in interior design at Politecnico di Milano and completed a master\\u2019s in exhibition design at Poli.Design. I like projects where a space has to carry an idea, where layout, graphics and content are doing the same job, and I\\u2019m comfortable taking one from research and concept through to renderings, drawings and the printed pieces that hold a show together.<\u002Fp><\u002Fdiv>'+\n        '<\u002Fdiv>'+\n        '<hr>'+\n        '<div class=\"cv-row\"><div>Curriculum Vitae <a href=\"https://drive.google.com/file/d/19Z5t3L9aQZ7DGCL7coiPqaofFcr1n9LH/view?usp=sharing\" target=\"_blank\" rel=\"noopener\">(Download)<\u002Fa><\u002Fdiv><div class=\"row-close\"><a data-close=\"all\">(Close)<\u002Fa><\u002Fdiv><\u002Fdiv>'+\n        '<hr>'+\n        '<div class=\"cv-row\">'+\n          '<div><em>Education<\u002Fem><\u002Fdiv>'+\n          '<div>'+\n            '<div class=\"entry\"><strong>Poli.Design, Milan<\u002Fstrong> \\u2014 IDEA Exhibition Design Master. Thesis: \\u201CMYCELIA, Oltre il cappello\\u201D \\u2014 an immersive exhibition on fungi and mycelial networks conceived for the Shed at Pirelli HangarBicocca. I developed the concept, spatial design, graphic identity and the show\\u2019s curatorial texts. <em>2024\\u20132026<\u002Fem><\u002Fdiv>'+\n            '<div class=\"entry\"><strong>Politecnico di Milano<\u002Fstrong> \\u2014 Interior Design, Bachelor\\u2019s Degree (BSc). <em>2021\\u20132024<\u002Fem><\u002Fdiv>'+\n            '<div class=\"entry\"><strong>Liceo Scientifico Niccol\\u00F2 Copernico, Udine.<\u002Fstrong> <em>2016\\u20132021<\u002Fem><\u002Fdiv>'+\n          '<\u002Fdiv>'+\n        '<\u002Fdiv>'+\n        '<hr>'+\n        '<div class=\"cv-row\">'+\n          '<div><em>Employment<\u002Fem><\u002Fdiv>'+\n          '<div>'+\n            '<div class=\"entry\"><strong>Parasite 2.0<\u002Fstrong> \\u2014 Architecture and Design Intern. Worked on exhibition and installation projects from early research through to final visuals: concept development, 3D modelling and renderings, and the presentation material used to bring ideas to clients. <em>Jan \\u201926 \\u2013 May \\u201926<\u002Fem><\u002Fdiv>'+\n            '<div class=\"entry\"><strong>AITALIA srl<\u002Fstrong> \\u2014 Visual &amp; Graphic Designer. Curated the company\\u2019s visual identity and communication (social media, presentations and editorial material) and kept the graphic language consistent across everything that went out. <em>2024 \\u2013 2026<\u002Fem><\u002Fdiv>'+\n            '<div class=\"entry\"><strong>Migliore + Servetto Architects<\u002Fstrong> \\u2014 Exhibition Design Intern. Worked across scales, from product design to interior architecture, with spatial research, concept work, technical drawings and visual material. <em>Sep \\u201925 \\u2013 Dec \\u201925<\u002Fem><\u002Fdiv>'+\n            '<div class=\"entry\"><strong>Alcova srl<\u002Fstrong> \\u2014 Press Office Assistant. Assisted with press communications and media relations before and during Alcova Miami 2024. Press and public accreditation, info desk management and event assistance at Villa Borsani (Varedo, MB). <em>MDW 2024<\u002Fem><\u002Fdiv>'+\n            '<div class=\"entry\"><strong>Alcova Shop at Rinascente Milano<\u002Fstrong> \\u2014 Client Assistance &amp; Sales. Provided customer service and supported sales activities at Alcova\\u2019s temporary shop in Rinascente during MDW 2024. <em>MDW 2024<\u002Fem><\u002Fdiv>'+\n          '<\u002Fdiv>'+\n        '<\u002Fdiv>'+\n        '<hr>'+\n        '<div class=\"cv-row\">'+\n          '<div><em>Skills<\u002Fem><\u002Fdiv>'+\n          '<div>'+\n            '<div class=\"entry\"><strong>Interpersonal<\u002Fstrong> \\u2014 Strong communication skills and ability to adapt to different contexts and working methods.<\u002Fdiv>'+\n            '<div class=\"entry\"><strong>Digital<\u002Fstrong> \\u2014 Good knowledge of Adobe Illustrator, Photoshop, InDesign, Acrobat, Figma, MS Office Suite, Rhinoceros (intermediate level), AutoCAD, Blender, Canva.<\u002Fdiv>'+\n          '<\u002Fdiv>'+\n        '<\u002Fdiv>'+\n        '<hr>'+\n        '<div class=\"cv-row\">'+\n          '<div><em>Languages<\u002Fem><\u002Fdiv>'+\n          '<div>'+\n            '<div class=\"entry\">Italian \\u2014 native<\u002Fdiv>'+\n            '<div class=\"entry\">English \\u2014 C1 (IELTS 2024)<\u002Fdiv>'+\n          '<\u002Fdiv>'+\n        '<\u002Fdiv>'+\n      '<\u002Fdiv>';\n      overlay.className = 'open';\n      document.body.style.overflow = 'hidden';\n      overlay.querySelectorAll('[data-close]').forEach(function(c){\n        c.addEventListener('click', function(e){ e.preventDefault(); closeAll(); });\n      });\n    }\n\n    /* ---------- dispatch ---------- */\n    document.getElementById('index').addEventListener('click', function(e){\n      var a = e.target.closest('[data-act]');\n      if(!a) return;\n      e.preventDefault();\n      var act = a.getAttribute('data-act');\n      if(act === 'home'){ closeAll(); window.scrollTo(0,0); return; }\n      if(act === 'about'){ openAbout(); return; }\n      if(act === 'project'){ openProject(+a.getAttribute('data-i')); return; }\n    });\n\n    /* ---------- last updated date (M.D.YY) ---------- */\n    var d = new Date();\n    document.getElementById('clock').textContent =\n      (d.getMonth()+1)+'.'+d.getDate()+'.'+String(d.getFullYear()).slice(-2);\n\n  })();\n  <\u002Fscript>\n\n  <!-- =======================================================================\n       SLIDESHOW EDIT LAYER  (construction scaffold — delete to ship)\n       To remove: delete this whole <script> block AND the CSS block marked\n       \"SLIDESHOW EDIT LAYER\" in <head>. The slideshow then renders the\n       images already saved in .slideshow.state.json as static assets.\n  ======================================================================== -->\n  <script>\n  (function(){\n    \"use strict\";\n\n    /* =====================================================================\n       IMAGE EDITING ON/OFF\n       false = visitors can only VIEW/scroll images (adding & removing off).\n       true  = editor mode: drag-drop to add, tap thumbnails to remove.\n       Flip this back to true whenever you want to change the images again.\n       All the editing code below stays intact either way.\n    ===================================================================== */\n    var EDIT_IMAGES = false;\n\n    if(!EDIT_IMAGES) return;                                    // editing disabled\n    if(!(window.omelette && window.omelette.writeFile)) return; // only in editor\n\n    window.__slideshowEditor = function(box){\n      var key = box.getAttribute('data-key');\n      var ss = window.__ss;\n      box.setAttribute('data-edit','');\n      function imgs(){ return ss.store[key] || (ss.store[key] = []); }\n      var selected = new Set();\n\n      var input = document.createElement('input');\n      input.type='file';\n      input.accept='image/png,image/jpeg,image/webp,image/avif';\n      input.multiple=true; input.style.display='none';\n      box.appendChild(input);\n\n      function refreshEmpty(){\n        var e = box.querySelector('.sl-empty');\n        if(!imgs().length){\n          if(!e){ e=document.createElement('div'); e.className='sl-empty'; e.textContent='+'; box.appendChild(e); }\n        } else if(e){ e.remove(); }\n      }\n\n      function addFiles(list){\n        var files = [].slice.call(list).filter(function(f){ return /^image\\//.test(f.type); });\n        if(!files.length) return;\n        var cap = ss.slots(key), room = cap - imgs().length;\n        if(room <= 0){ alert('Questo progetto ha raggiunto il massimo di '+cap+' immagini.'); return; }\n        if(files.length > room){ alert('Spazio solo per altre '+room+' immagini in questo progetto: aggiungo le prime '+room+'.'); files = files.slice(0, room); }\n        Promise.all(files.map(function(f){ return ss.encode(f); })).then(function(urls){\n          var a = imgs();\n          urls.forEach(function(u){ a.push(u); });\n          ss.save(key);\n          paint();\n        });\n      }\n\n      box.addEventListener('click', function(){ input.click(); });\n      input.addEventListener('change', function(){ addFiles(input.files); input.value=''; });\n      box.addEventListener('dragover', function(e){ e.preventDefault(); box.setAttribute('data-over',''); });\n      box.addEventListener('dragleave', function(e){ if(e.target===box) box.removeAttribute('data-over'); });\n      box.addEventListener('drop', function(e){\n        e.preventDefault(); box.removeAttribute('data-over');\n        if(e.dataTransfer && e.dataTransfer.files) addFiles(e.dataTransfer.files);\n      });\n\n      function buildManage(){\n        var pop = box.closest('.pop-img');\n        var old = pop.querySelector('.sl-manage-wrap'); if(old) old.remove();\n        refreshEmpty();\n        var arr = imgs();\n        if(!arr.length) return;\n        var wrap = document.createElement('div'); wrap.className='sl-manage-wrap';\n        var strip = document.createElement('div'); strip.className='sl-manage';\n        arr.forEach(function(u, idx){\n          var t = document.createElement('div'); t.className='sl-thumb';\n          if(selected.has(idx)) t.setAttribute('data-sel','');\n          var im = document.createElement('img'); im.src=u; im.alt='';\n          t.appendChild(im);\n          t.addEventListener('click', function(ev){\n            ev.stopPropagation();\n            if(selected.has(idx)) selected.delete(idx); else selected.add(idx);\n            buildManage();\n          });\n          strip.appendChild(t);\n        });\n        wrap.appendChild(strip);\n        var rm = document.createElement('div'); rm.className='sl-remove';\n        var link = document.createElement('a');\n        link.textContent = selected.size ? '(Remove '+selected.size+')' : '(Tap images to select)';\n        if(selected.size){\n          link.addEventListener('click', function(ev){\n            ev.stopPropagation();\n            ss.store[key] = arr.filter(function(_, idx){ return !selected.has(idx); });\n            selected.clear(); ss.save(key); paint();\n          });\n        }\n        rm.appendChild(link);\n        wrap.appendChild(rm);\n        pop.appendChild(wrap);\n      }\n\n      function paint(){ ss.render(box); buildManage(); ss.cycle(box); }\n      paint();\n    };\n  })();\n  <\u002Fscript>\n  <!-- ===================== END SLIDESHOW EDIT LAYER ===================== -->\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
